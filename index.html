<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Pangolin&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="./codemirror/theme/paraiso-light.css">
  <link rel="stylesheet" href="./dist/main.css" />

  <script src="./dist/main.js" defer></script>
  <title>JS Project Skeleton</title>
</head>

<body>
  <div class="level-container">
    <li>Level 1</li>
    <li>Level 2</li>
    <li>Level 3</li>
    <li>Level 4</li>
    <li>Level 5</li>
    <li>Level 6</li>
    <li>Level 7</li>
    <li>Level 8</li>
    <li>Level 9</li>
    <li>Level 10</li>
  </div>
  <div id="root">
    <div id="outer-typing-cont">
      <div id="question-box" class="box">Choose A Level to Begin!</div>
      <div id="response-box">
        <textarea id="typing-box" autofocus></textarea>
        <span id="button" class="button-style">RUN</span>
      </div>

      <div id="output-container">
        <div id="output-box" class="box">Push Button To Run Code</div>

      </div>
    </div>
  </div>
  </div>
</body>

</html>
