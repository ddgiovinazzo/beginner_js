<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="./codemirror/lib/codemirror.css">
  <link rel="stylesheet" href="./codemirror/theme/paraiso-light.css">
  <link rel="stylesheet" href="./dist/main.css" />

  <script src="./dist/main.js" defer></script>
  <title>JS Project Skeleton</title>
</head>

<body>
  <div id="root">
    <div id="outer-typing-cont">
      <div id="question-box" class="box">Hello World!</div>
      <div id="response-box">
        <textarea id="typing-box" autofocus></textarea>
        <span id="button" class="button-style">RUN</span>
      </div>

      <div id="output-container">
        <div id="output-box" class="box">Click Button To Run Code</div>

      </div>
    </div>
  </div>
  </div>
</body>

</html>
